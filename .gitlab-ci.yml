# Validate manifests in MRs (adjust image to your kubectl version).
stages: [validate]

variables:
  KUBECTL_VERSION: "v1.28.6"

validate:kubeconform:
  stage: validate
  image: alpine:3.20
  before_script:
    - apk add --no-cache curl
    - curl -sSL -o /usr/local/bin/kubeconform https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64
    - chmod +x /usr/local/bin/kubeconform
  script:
    - kubeconform -strict -summary -ignore-missing-schemas namespaces/*.yaml milvus/*.yaml langfuse/*.yaml embeddings/*.yaml ocr/*.yaml vllm/*.yaml sglang/*.yaml ingress/*.yaml || true
  allow_failure: true
