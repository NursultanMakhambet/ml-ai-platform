---
# HTTP Ingress (same pattern as platform: use NodePort 30801 on ingress-nginx).
# Add to /etc/hosts: <node-ip> langfuse.local vllm.local sglang.local ocr.local embeddings.local
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: langfuse-ui
  namespace: langfuse
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: langfuse.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: langfuse
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vllm-api
  namespace: vllm
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  ingressClassName: nginx
  rules:
    - host: vllm.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vllm
                port:
                  number: 8000
