---
# SGLang — primarily GPU-oriented. This template requests CPU only; expect limited functionality.
# When GTX 1070 is available, add nvidia.com/gpu: 1 and follow SGLang CUDA docs.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sglang
  namespace: sglang
  labels:
    app: sglang
    app.kubernetes.io/part-of: ml-ai-platform
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: sglang
  template:
    metadata:
      labels:
        app: sglang
        llm-heavy: "true"
    spec:
      containers:
        - name: sglang
          image: metaphorprojects/sglang-cpu:latest
          command: ["/bin/bash", "-lc"]
          args:
            - |
              export SGLANG_USE_CPU_ENGINE=1
              pip uninstall -y intel-extension-for-pytorch torchvision >/dev/null 2>&1 || true
              python3 -m sglang.launch_server --model-path TinyLlama/TinyLlama-1.1B-Chat-v1.0 --host 0.0.0.0 --port 30000 --device cpu || sleep infinity
          ports:
            - containerPort: 30000
          volumeMounts:
            - name: huggingface-cache
              mountPath: /root/.cache/huggingface
          resources:
            requests:
              cpu: "250m"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          readinessProbe:
            tcpSocket:
              port: 30000
            initialDelaySeconds: 120
            periodSeconds: 20
      volumes:
        - name: huggingface-cache
          persistentVolumeClaim:
            claimName: huggingface-cache
---
apiVersion: v1
kind: Service
metadata:
  name: sglang
  namespace: sglang
spec:
  selector:
    app: sglang
  ports:
    - port: 30000
      targetPort: 30000
