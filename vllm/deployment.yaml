---
# vLLM OpenAI server — CPU mode for dev (slow). When GPU is available: remove CPU env,
# add nvidia.com/gpu: 1 and use a smaller quantized model for 8GB VRAM.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: vllm
  labels:
    app: vllm
    app.kubernetes.io/part-of: ml-ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.6.3
          args:
            - --model
            - TinyLlama/TinyLlama-1.1B-Chat-v1.0
            - --dtype
            - float32
            - --max-model-len
            - "1024"
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --device
            - cpu
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "1000m"
              memory: 6Gi
            limits:
              cpu: "4"
              memory: 12Gi
          # vLLM exposes OpenAI API; /v1/models is available when ready.
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 420
            periodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: vllm
spec:
  selector:
    app: vllm
  ports:
    - port: 8000
      targetPort: 8000
