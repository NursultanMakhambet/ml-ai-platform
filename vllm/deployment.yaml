---
# vLLM OpenAI server — CPU mode for dev (slow). When GPU is available: remove CPU env,
# add nvidia.com/gpu: 1 and use a smaller quantized model for 8GB VRAM.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: vllm
  labels:
    app: vllm
    app.kubernetes.io/part-of: ml-ai-platform
spec:
  replicas: 1
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
        llm-heavy: "true"
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        ai-gpu-node: "true"
      tolerations:
        - key: ai-gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: llm-heavy
                      operator: In
                      values: ["true"]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.6.3
          args:
            - --model
            - TinyLlama/TinyLlama-1.1B-Chat-v1.0
            - --dtype
            - float16
            - --max-model-len
            - "1024"
            - --gpu-memory-utilization
            - "0.70"
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: huggingface-cache
              mountPath: /root/.cache/huggingface
          resources:
            requests:
              cpu: "500m"
              memory: 2Gi
              nvidia.com/gpu: 1
            limits:
              cpu: "2"
              memory: 4Gi
              nvidia.com/gpu: 1
          # vLLM exposes OpenAI API; /v1/models is available when ready.
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 420
            periodSeconds: 60
      volumes:
        - name: huggingface-cache
          persistentVolumeClaim:
            claimName: huggingface-cache
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: vllm
spec:
  selector:
    app: vllm
  ports:
    - port: 8000
      targetPort: 8000
