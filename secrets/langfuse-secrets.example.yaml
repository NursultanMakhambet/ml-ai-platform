---
# Copy to langfuse-secrets.yaml and replace placeholders BEFORE applying.
# Generate: openssl rand -hex 16  (use different outputs for each secret)
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-secrets
  namespace: langfuse
type: Opaque
stringData:
  postgres-password: "CHANGE_ME_POSTGRES"
  # postgresql://langfuse:PASSWORD@postgres:5432/langfuse
  database-url: "postgresql://langfuse:CHANGE_ME_POSTGRES@postgres:5432/langfuse"
  nextauth-secret: "CHANGE_ME_NEXTAUTH_32_CHARS_MIN"
  salt: "CHANGE_ME_SALT"
