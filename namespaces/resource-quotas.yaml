---
# Soft caps for dev — prevents one namespace from exhausting the cluster.
# Adjust aggregate limits if you add GPU nodes or larger nodes.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ml-quota-milvus
  namespace: milvus
spec:
  hard:
    requests.cpu: "4"
    limits.cpu: "8"
    requests.memory: 8Gi
    limits.memory: 16Gi
    persistentvolumeclaims: "5"
---
